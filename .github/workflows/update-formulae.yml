name: Update formulae

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * *"

permissions:
  contents: write

concurrency:
  group: update-formulae
  cancel-in-progress: false

jobs:
  update:
    runs-on: macos-latest
    steps:
      - name: Check out tap repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Update formulae from latest releases
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python3 scripts/update_formulae.py --latest

      - name: Validate formula style
        env:
          HOMEBREW_FORCE_VENDOR_RUBY: "1"
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: brew style Formula/*.rb

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push updates
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/*.rb formulae/*.json
          git commit -m "Update Homebrew formulae"
          git push
